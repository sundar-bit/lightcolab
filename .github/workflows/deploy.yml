name: Deploy site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel a stuck older one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .          # the site lives at the repo root

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          timeout: 900000  # 15 min, more generous than the default 10
